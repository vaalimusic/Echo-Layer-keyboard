apply plugin: 'com.android.application'

android {
    defaultConfig {
        applicationId "rkr.simplekeyboard.inputmethod"
        compileSdk 36
        minSdkVersion 24
        targetSdkVersion 36
        versionCode 150
        versionName "1.5.0"
    }
    signingConfigs {
        release {
            // Reuse the local debug keystore so the release APK is installable
            // on devices without setting up a separate signing workflow yet.
            initWith signingConfigs.debug
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    namespace 'rkr.simplekeyboard.inputmethod'
}

dependencies {
    testImplementation 'junit:junit:4.13.2'
}
